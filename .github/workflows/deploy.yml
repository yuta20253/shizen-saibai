name: Build & Push Image & Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: yuta2025
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push frontend image
        run: |
          TAG=${{ github.sha }}
          docker build --no-cache -f frontend/Dockerfile.prod \
            --build-arg NEXT_PUBLIC_BACKEND_URL=https://zasso-lens.com \
            -t yuta2025/shizen-frontend:$TAG \
            ./frontend
          docker push yuta2025/shizen-frontend:$TAG

      - name: Build and Push nginx image
        run: |
          TAG=${{ github.sha }}
          docker build -f nginx/Dockerfile \
            -t yuta2025/shizen-nginx:$TAG \
            ./nginx
          docker push yuta2025/shizen-nginx:$TAG

      - name: Build and Push rails image
        run: |
          TAG=${{ github.sha }}
          docker build -f rails/Dockerfile.prod \
            -t yuta2025/shizen-rails:$TAG \
            ./rails
          docker push yuta2025/shizen-rails:$TAG

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SAKURA_CLOUD_SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./docker-compose.prod.yml"
          target: "~/zasso-lens/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SAKURA_CLOUD_SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/zasso-lens

            export IMAGE_TAG='${{ github.sha }}'

            export MYSQL_ROOT_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}'
            export MYSQL_DATABASE='${{ secrets.MYSQL_DATABASE }}'
            export MYSQL_USER='${{ secrets.MYSQL_USER }}'
            export MYSQL_PASSWORD='${{ secrets.MYSQL_PASSWORD }}'
            export LETSENCRYPT_EMAIL='${{ secrets.LETSENCRYPT_EMAIL }}'
            export DEVISE_JWT_SECRET_KEY='${{ secrets.DEVISE_JWT_SECRET_KEY }}'
            export CHATGPT_API_KEY='${{ secrets.CHATGPT_API_KEY }}'
            export SECRET_KEY_BASE='${{ secrets.SECRET_KEY_BASE }}'
            export FRONTEND_URL='https://zasso-lens.com'

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker compose -f docker-compose.prod.yml ps || true
            docker compose -f docker-compose.prod.yml logs --tail=200 nginx || true
            docker compose -f docker-compose.prod.yml logs --tail=200 rails || true
